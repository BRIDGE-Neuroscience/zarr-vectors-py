id: https://w3id.org/zarr-vectors/schema/0.5
name: zarr_vectors
title: Zarr Vectors (ZV) format
description: >
  Reference schema for the Zarr Vectors (ZV) on-disk metadata (0.5.0).
  Covers the root-level ``.zattrs`` block (``zarr_vectors`` envelope),
  the NGFF ``multiscales`` block (which now carries the canonical axes
  list — ZV no longer duplicates them under ``spatial_index_dims``),
  the per-resolution-level ``.zattrs`` block (``zarr_vectors_level``
  envelope), and the per-array ``.zattrs`` shapes emitted by the
  writers in ``zarr_vectors/core/arrays.py`` (discriminator slot
  ``zv_array``).
license: BSD-3-Clause

prefixes:
  linkml: https://w3id.org/linkml/
  zv: https://w3id.org/zarr-vectors/schema/0.5/
  ngff: https://ngff.openmicroscopy.org/0.4/
  schema: http://schema.org/

default_prefix: zv
default_range: string

imports:
  - linkml:types

# ===================================================================
# Enums — closed string sets used as discriminators and convention values.
# ===================================================================

enums:
  LinksConvention:
    description: >
      How intra-chunk links are represented for a polyline/graph/mesh.
    permissible_values:
      explicit:
        description: An explicit per-chunk ``links/<chunk_key>`` array is written.
      implicit_sequential:
        description: Vertex ordering encodes the polyline; no links array.
      implicit_sequential_with_branches:
        description: Skeleton convention — implicit sequential plus branch list.

  ObjectIndexConvention:
    description: How the object_id → vertex-group mapping is encoded.
    permissible_values:
      standard:
        description: Full ``object_index`` array maps each object to its VG refs.
      identity:
        description: >
          One object per vertex; only valid in single-chunk stores
          where the object_index would be redundant.

  CrossChunkStrategy:
    description: How connectivity that crosses chunk boundaries is represented.
    permissible_values:
      boundary_deduplication:
        description: Vertices on a chunk boundary are duplicated in each chunk.
      explicit_links:
        description: A ``cross_chunk_links`` array bridges the boundary.
      both:
        description: Both boundary duplication and explicit links are present.

  CrossLevelStorage:
    description: >
      How cross-pyramid-level edges are stored in the multiscale links
      layout (``links/<delta>/`` and ``cross_chunk_links/<delta>/``).
    permissible_values:
      none:
        description: No cross-level link arrays are emitted (``cross_level_depth=0``).
      implicit:
        description: >
          Only positive deltas (``+1``, ``+2``, ...) are materialized at the
          finer level.  Negative-delta edges are reconstructed on read by
          flipping the matching positive-delta array at the coarser level.
      explicit:
        description: >
          Both positive and negative deltas are materialized.  Writes
          ``+N`` at the finer level and ``-N`` at the coarser level.

  GeometryType:
    description: The kind of geometry a store (or one of its sub-types) holds.
    permissible_values:
      point_cloud:
      line:
      polyline:
      streamline:
      skeleton:
      graph:
      mesh:

  Encoding:
    description: Per-array encoding of vertex data.
    permissible_values:
      raw:
        description: Raw little-endian binary in the dtype's natural layout.
      draco:
        description: Google Draco mesh / point-cloud compression.

  FormatCapability:
    description: >
      Optional feature tokens a store advertises in
      :attr:`RootMetadata.format_capabilities`.  Open-set: new tokens
      will be added in future spec revisions; readers must tolerate
      unknown values.
    permissible_values:
      preserved_object_ids:
        description: >
          At least one level was written with ID-preserving sparsification
          (``LevelMetadata.preserves_object_ids=True``).  Dropped objects
          appear as empty manifest slots; ``parent_level`` carries
          semantic weight on those levels.
      shared_fragments:
        description: >
          At least one level stores per-chunk fragments that may be
          referenced by multiple objects' manifests (the v0.6 successor
          to ``shared_vertex_groups``; the sharing primitive is now a
          fragment rather than a contiguous-byte vertex group).
      fragment_index:
        description: >
          The store uses the v0.6 fragment-index encoding for
          ``vertex_fragments`` and ``link_fragments`` (a single uint8
          blob per chunk with a tagged-bitmap header + range table +
          explicit CSR; see :mod:`zarr_vectors.encoding.fragments`).
      multiscale_links:
        description: >
          Store uses the 0.4 multiscale links layout
          (``links/<delta>/``, ``cross_chunk_links/<delta>/``,
          ``link_attributes/<name>/<delta>/`` and
          ``cross_chunk_link_attributes/<name>/<delta>/``) and
          may contain cross-pyramid-level edges (``delta != 0``).

  ZvArrayTag:
    description: >
      Discriminator value for per-array ``.zattrs`` blocks (slot
      ``zv_array``).  Each writer in ``zarr_vectors/core/arrays.py``
      stamps the corresponding tag.
    permissible_values:
      vertices:
      vertex_fragments:
        description: >
          Per-chunk fragment-index group for ``vertices/<chunk>`` (v0.6+).
          Replaces the v0.5 ``vertex_group_offsets``.
      link_fragments:
        description: >
          Per-chunk fragment-index group for ``links/0/<chunk>`` (v0.6+,
          delta == 0 only).  Splits the v0.5 inline self-describing
          header into a sibling group so link bytes can be addressed
          uniformly with vertex bytes.
      links:
      attribute:
      object_index:
      object_attribute:
      groupings:
      groupings_attribute:
      cross_chunk_links:
      link_attribute:
      cross_chunk_link_attribute:

# ===================================================================
# Classes
# ===================================================================

classes:

  # ----- shared substructures -------------------------------------------

  Axis:
    class_uri: ngff:Axis
    description: >
      One axis of the spatial index.  Mirrors the OME-Zarr NGFF axis
      object (RFC 4/5).
    slots:
      - name
      - type
      - unit

  BoundingBox:
    description: >
      Two parallel ``ndim``-length arrays representing the global
      ``(min_corner, max_corner)`` of the store's vertices.  Stored on
      disk as ``[[min...], [max...]]``; modelled here as a class so
      cross-field rules can require matching dimensionality.
    slots:
      - min_corner
      - max_corner

  CRS:
    description: >
      Free-form coordinate reference system metadata.  Modelled as an
      open dict because real-world CRS payloads come from many
      vocabularies (WKT, PROJ4, EPSG, CF conventions, ...) and we don't
      want to force a single one.  Generators that consume this schema
      should emit ``additionalProperties: true`` or equivalent.
    class_uri: linkml:Any

  # ----- root + level metadata ------------------------------------------

  RootMetadata:
    description: >
      Root-level ``.zattrs`` payload, persisted under the key
      ``zarr_vectors``.  Validates the runtime
      :class:`zarr_vectors.core.metadata.RootMetadata` dataclass.
      Note: the canonical axis list lives in
      ``multiscales[0].axes`` at root level (NGFF-style), NOT under
      ``zarr_vectors`` — see ``MultiscalesMetadata``.
    slots:
      - zv_version
      - chunk_shape
      - bounds
      - geometry_types
      - crs
      - links_convention
      - object_index_convention
      - cross_chunk_strategy
      - cross_level_depth
      - cross_level_storage
      - reduction_factor
      - base_bin_shape
      - format_capabilities

  LevelMetadata:
    description: >
      Per-resolution-level ``.zattrs`` payload, persisted under the key
      ``zarr_vectors_level``.  Validates the runtime
      :class:`zarr_vectors.core.metadata.LevelMetadata` dataclass.
    slots:
      - level
      - vertex_count
      - arrays_present
      - bin_shape
      - bin_ratio
      - object_sparsity
      - coarsening_method
      - parent_level
      - chunk_dims
      - chunk_attribute_name
      - chunk_attribute_values
      - preserves_object_ids
      - inherited_num_objects
      - shared_fragments

  # ----- per-array .zattrs shapes (zv_array discriminator) --------------

  VerticesMeta:
    description: "``.zattrs`` for the ``vertices/`` array."
    slots: [zv_array, dtype, encoding]
    slot_usage:
      zv_array:
        equals_string: vertices
        required: true

  LinksMeta:
    description: >
      ``.zattrs`` for a ``links/<delta>/`` array.  Under the 0.4
      multiscale layout, each delta segment carries its own meta block;
      ``level_delta=0`` is the intra-level array (the only one written
      pre-0.4).
    slots: [zv_array, dtype, link_width, level_delta]
    slot_usage:
      zv_array:
        equals_string: links
        required: true

  AttributeMeta:
    description: "``.zattrs`` for each ``attributes/<name>/`` array."
    slots: [zv_array, name, dtype, channel_names]
    slot_usage:
      zv_array:
        equals_string: attribute
        required: true

  ObjectIndexMeta:
    description: "``.zattrs`` for ``object_index/``."
    slots: [zv_array, num_objects, sid_ndim]
    slot_usage:
      zv_array:
        equals_string: object_index
        required: true

  ObjectAttributeMeta:
    description: "``.zattrs`` for each ``object_attributes/<name>/`` array."
    slots: [zv_array, name, dtype, shape]
    slot_usage:
      zv_array:
        equals_string: object_attribute
        required: true

  GroupingsMeta:
    description: "``.zattrs`` for ``groupings/``."
    slots: [zv_array, num_groups]
    slot_usage:
      zv_array:
        equals_string: groupings
        required: true

  GroupingsAttributeMeta:
    description: "``.zattrs`` for each ``groupings_attributes/<name>/`` array."
    slots: [zv_array, name, dtype, shape]
    slot_usage:
      zv_array:
        equals_string: groupings_attribute
        required: true

  CrossChunkLinksMeta:
    description: >
      ``.zattrs`` for a ``cross_chunk_links/<delta>/`` array.  Each
      delta segment carries its own meta block; ``level_delta=0`` is
      the intra-level array.  Each record is ``link_width``
      ``(chunk_coords, vertex_idx)`` endpoints — ``link_width=2``
      encodes a cross-chunk edge, ``link_width=3`` a triangle face
      record, and so on.  Source-side endpoint (endpoint 0) lives at
      the array's own resolution level; target-side endpoints live at
      ``this_level + level_delta``.
    slots: [zv_array, num_links, sid_ndim, level_delta, link_width]
    slot_usage:
      zv_array:
        equals_string: cross_chunk_links
        required: true

  LinkAttributeMeta:
    description: >
      ``.zattrs`` for each ``link_attributes/<name>/<delta>/`` array.
      Parallel to the ``links/<delta>/`` array of the same ``<delta>``.
    slots: [zv_array, name, dtype, level_delta]
    slot_usage:
      zv_array:
        equals_string: link_attribute
        required: true

  CrossChunkLinkAttributeMeta:
    description: >
      ``.zattrs`` for each ``cross_chunk_link_attributes/<name>/<delta>/``
      array.  Stored as a flat blob parallel to the ``data`` blob of the
      matching ``cross_chunk_links/<delta>/`` array; ``num_links`` MUST
      equal the parallel CCL array's ``num_links``.
    slots: [zv_array, name, dtype, level_delta, num_links]
    slot_usage:
      zv_array:
        equals_string: cross_chunk_link_attribute
        required: true

# ===================================================================
# Slots
# ===================================================================

slots:

  # -- Axis ---------------------------------------------------------------

  name:
    description: NGFF axis or attribute name (e.g. "x", "intensity").
    range: string
    required: true
    slot_uri: schema:name
  type:
    description: NGFF axis type — "space", "time", or "channel".
    range: string
    required: true
  unit:
    description: NGFF unit string (e.g. "um", "nanometer", "second").
    range: string

  # -- BoundingBox --------------------------------------------------------

  min_corner:
    description: Per-axis minima.  Length must equal ``len(spatial_index_dims)``.
    range: float
    multivalued: true
    required: true
  max_corner:
    description: Per-axis maxima.  Length must equal ``len(spatial_index_dims)``.
    range: float
    multivalued: true
    required: true

  # -- RootMetadata ------------------------------------------------------

  zv_version:
    description: >
      ZV spec version this store was written against (e.g. "0.5.0").
      Renamed from ``format_version`` in 0.5.0 to disambiguate from
      Zarr v3's ``zarr_format`` field.
    range: string
    required: true
    slot_uri: schema:version
    pattern: '^\d+\.\d+(\.\d+)?$'
  chunk_shape:
    description: Physical spatial chunk size per axis (all values > 0).
    range: float
    multivalued: true
    required: true
  bounds:
    description: Global vertex bounding box.
    range: BoundingBox
    required: true
  geometry_types:
    description: One or more geometry kinds present in the store.
    range: GeometryType
    multivalued: true
    required: true
    minimum_cardinality: 1
  crs:
    description: >
      Optional coordinate reference system metadata (free-form dict
      matching whatever CRS vocabulary the store uses, e.g. WKT,
      PROJ4, EPSG, CF conventions).
    range: CRS
    inlined: true
    slot_uri: schema:coordinateReferenceSystem
  links_convention:
    range: LinksConvention
  object_index_convention:
    range: ObjectIndexConvention
  cross_chunk_strategy:
    range: CrossChunkStrategy
  cross_level_depth:
    description: >
      Maximum absolute level delta for which cross-pyramid-level link
      arrays are materialized.  ``0`` = none (no ``+N`` or ``-N``
      arrays), ``N`` = generate up to ``±N`` (or ``+N`` only when
      ``cross_level_storage="implicit"``), ``-1`` = all available
      pyramid levels.  Default ``1``.
    range: integer
    minimum_value: -1
  cross_level_storage:
    description: >
      Whether cross-level link arrays are written in both directions
      (``explicit``: ``+N`` at the finer level AND ``-N`` at the
      coarser level) or only positive deltas (``implicit``: only
      ``+N``, with ``-N`` reconstructed on read).  Default
      ``explicit``.
    range: CrossLevelStorage
  reduction_factor:
    description: Multi-resolution coarsening factor (≥ 2).
    range: integer
    minimum_value: 2
  base_bin_shape:
    description: >
      Supervoxel bin edge lengths at level 0.  When set, every value
      must be > 0 and ``chunk_shape`` must be an integer multiple along
      every axis (enforced runtime-side in ``RootMetadata.validate``).
    range: float
    multivalued: true
  format_capabilities:
    description: Optional 0.3+ feature tokens advertised by this store.
    range: FormatCapability
    multivalued: true

  # -- LevelMetadata -----------------------------------------------------

  level:
    description: Resolution level index (0 = full resolution).
    range: integer
    minimum_value: 0
    required: true
  vertex_count:
    description: Total number of vertices at this level.
    range: integer
    minimum_value: 0
    required: true
  arrays_present:
    description: Names of arrays present in the level group.
    range: string
    multivalued: true
    required: true
  bin_shape:
    description: >
      Per-axis supervoxel edge lengths at this level.  Must be ``None``
      for level 0 (inherits ``base_bin_shape``); must be set for
      level > 0.
    range: float
    multivalued: true
  bin_ratio:
    description: Integer fold-change per axis relative to level 0.
    range: integer
    multivalued: true
  object_sparsity:
    description: Fraction of objects retained at this level.
    range: float
    minimum_value: 0.0
    maximum_value: 1.0
  coarsening_method:
    description: How this level was generated (e.g. "grid_metanode").
    range: string
  parent_level:
    description: Source level index (None for level 0).
    range: integer
    minimum_value: 0
  chunk_dims:
    description: >
      Chunk-key axis names; the leading axis names appear first.  Set
      when the level uses attribute chunking (e.g. ``["gene", "z", "y",
      "x"]``).
    range: string
    multivalued: true
  chunk_attribute_name:
    description: Name of the per-vertex attribute used as the leading chunk axis.
    range: string
  chunk_attribute_values:
    description: >
      Ordered list mapping attribute-bin index to original attribute
      value.  Must be non-empty when set, and coherent with
      ``chunk_attribute_name`` (both set or both absent).
    range: string
    multivalued: true
  preserves_object_ids:
    description: >
      True for levels written by the per-object pyramid regime.  When
      set, ``num_objects`` and ``object_attributes`` row count inherit
      from the parent level's OID space; dropped objects leave empty
      manifest slots and zero ``present_mask`` bytes.  ``parent_level``
      is load-bearing under this flag.
    range: boolean
  inherited_num_objects:
    description: >
      OID-space size inherited from the parent level
      (= ``parent_level.num_objects``).  Required when
      ``preserves_object_ids`` is true; absent on standalone levels.
    range: integer
    minimum_value: 0
  shared_fragments:
    description: >
      True when per-chunk fragments may be referenced by multiple
      objects' manifests (shared metavertices in the per-object pyramid
      regime).  v0.6 successor to ``shared_vertex_groups``.  Readers
      MAY use this to short-circuit dedup work.
    range: boolean

  # -- per-array .zattrs ------------------------------------------------

  zv_array:
    description: >
      Discriminator slot identifying the kind of per-array ``.zattrs``
      block.  Each writer in ``core/arrays.py`` stamps the
      corresponding token from :class:`ZvArrayTag`.
    range: ZvArrayTag
    required: true
  dtype:
    description: Numpy dtype string of the array's value type (e.g. "float32").
    range: string
    required: true
  encoding:
    description: How the chunk bytes are encoded.
    range: Encoding
  channel_names:
    description: For multi-channel per-vertex attributes, the channel labels.
    range: string
    multivalued: true
  link_width:
    description: >
      Width of a links row (1 for parent→child metanode references, 2
      for edges, 3 for triangle faces, 4 for quads).
    range: integer
    minimum_value: 1
    required: true
  level_delta:
    description: >
      Pyramid-level delta between the source side (the level that owns
      this array) and the target side of the edges.  ``0`` for
      intra-level arrays (the only kind written pre-0.4), ``+N`` for
      edges from this level to ``this_level + N`` (coarser), ``-N``
      for edges to ``this_level - N`` (finer).
    range: integer
    required: true
  num_objects:
    description: Total object count this array carries.
    range: integer
    minimum_value: 0
    required: true
  num_groups:
    description: Total grouping count.
    range: integer
    minimum_value: 0
    required: true
  num_links:
    description: Total cross-chunk link count.
    range: integer
    minimum_value: 0
    required: true
  sid_ndim:
    description: Number of spatial-index dimensions encoded in chunk keys.
    range: integer
    minimum_value: 1
    required: true
  shape:
    description: Shape of a dense per-object/per-group array.
    range: integer
    multivalued: true
    required: true
