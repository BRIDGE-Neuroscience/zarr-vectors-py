id: https://w3id.org/zarr-vectors/schema/0.3
name: zarr_vectors
title: Zarr Vectors (ZV) format
description: >
  Reference schema for the Zarr Vectors (ZV) on-disk metadata.  Covers
  the root-level ``.zattrs`` block (``zarr_vectors`` envelope), the
  per-resolution-level ``.zattrs`` block (``zarr_vectors_level`` envelope),
  and the per-array ``.zattrs`` shapes emitted by the writers in
  ``zarr_vectors/core/arrays.py`` (discriminator slot ``zv_array``).
license: BSD-3-Clause

prefixes:
  linkml: https://w3id.org/linkml/
  zv: https://w3id.org/zarr-vectors/schema/0.3/
  ngff: https://ngff.openmicroscopy.org/0.5/
  schema: http://schema.org/

default_prefix: zv
default_range: string

imports:
  - linkml:types

# ===================================================================
# Enums — closed string sets used as discriminators and convention values.
# ===================================================================

enums:
  LinksConvention:
    description: >
      How intra-chunk links are represented for a polyline/graph/mesh.
    permissible_values:
      explicit:
        description: An explicit per-chunk ``links/<chunk_key>`` array is written.
      implicit_sequential:
        description: Vertex ordering encodes the polyline; no links array.
      implicit_sequential_with_branches:
        description: Skeleton convention — implicit sequential plus branch list.

  ObjectIndexConvention:
    description: How the object_id → vertex-group mapping is encoded.
    permissible_values:
      standard:
        description: Full ``object_index`` array maps each object to its VG refs.
      identity:
        description: >
          One object per vertex; only valid in single-chunk stores
          where the object_index would be redundant.

  CrossChunkStrategy:
    description: How connectivity that crosses chunk boundaries is represented.
    permissible_values:
      boundary_deduplication:
        description: Vertices on a chunk boundary are duplicated in each chunk.
      explicit_links:
        description: A ``cross_chunk_links`` array bridges the boundary.
      both:
        description: Both boundary duplication and explicit links are present.

  GeometryType:
    description: The kind of geometry a store (or one of its sub-types) holds.
    permissible_values:
      point_cloud:
      line:
      polyline:
      streamline:
      skeleton:
      graph:
      mesh:

  Encoding:
    description: Per-array encoding of vertex data.
    permissible_values:
      raw:
        description: Raw little-endian binary in the dtype's natural layout.
      draco:
        description: Google Draco mesh / point-cloud compression.

  FormatCapability:
    description: >
      Optional 0.3+ feature tokens a store advertises in
      :attr:`RootMetadata.format_capabilities`.  Open-set: new tokens
      will be added in future spec revisions; readers must tolerate
      unknown values.
    permissible_values:
      cross_chunk_faces:
        description: Store has the ``cross_chunk_faces`` array for boundary faces.
      vertex_count_cache:
        description: Per-chunk ``vertex_counts/<chunk_key>`` sidecars are present.
      object_index_pending:
        description: One or more uncompacted ``object_index/pending/<batch>`` sidecars exist.

  ZvArrayTag:
    description: >
      Discriminator value for per-array ``.zattrs`` blocks (slot
      ``zv_array``).  Each writer in ``zarr_vectors/core/arrays.py``
      stamps the corresponding tag.
    permissible_values:
      vertices:
      links:
      attribute:
      object_index:
      object_index_pending:
      object_attribute:
      groupings:
      groupings_attribute:
      cross_chunk_links:
      cross_chunk_faces:
      link_attribute:
      metanode_children:

# ===================================================================
# Classes
# ===================================================================

classes:

  # ----- shared substructures -------------------------------------------

  Axis:
    class_uri: ngff:Axis
    description: >
      One axis of the spatial index.  Mirrors the OME-Zarr NGFF axis
      object (RFC 4/5).
    slots:
      - name
      - type
      - unit

  BoundingBox:
    description: >
      Two parallel ``ndim``-length arrays representing the global
      ``(min_corner, max_corner)`` of the store's vertices.  Stored on
      disk as ``[[min...], [max...]]``; modelled here as a class so
      cross-field rules can require matching dimensionality.
    slots:
      - min_corner
      - max_corner

  # ----- root + level metadata ------------------------------------------

  RootMetadata:
    description: >
      Root-level ``.zattrs`` payload, persisted under the key
      ``zarr_vectors``.  Validates the runtime
      :class:`zarr_vectors.core.metadata.RootMetadata` dataclass.
    slots:
      - format_version
      - spatial_index_dims
      - chunk_shape
      - bounds
      - geometry_types
      - crs
      - links_convention
      - object_index_convention
      - cross_chunk_strategy
      - reduction_factor
      - base_bin_shape
      - format_capabilities

  LevelMetadata:
    description: >
      Per-resolution-level ``.zattrs`` payload, persisted under the key
      ``zarr_vectors_level``.  Validates the runtime
      :class:`zarr_vectors.core.metadata.LevelMetadata` dataclass.
    slots:
      - level
      - vertex_count
      - arrays_present
      - bin_shape
      - bin_ratio
      - object_sparsity
      - coarsening_method
      - parent_level
      - chunk_dims
      - chunk_attribute_name
      - chunk_attribute_values

  # ----- per-array .zattrs shapes (zv_array discriminator) --------------

  VerticesMeta:
    description: "``.zattrs`` for the ``vertices/`` array."
    slots: [zv_array, dtype, encoding]
    slot_usage:
      zv_array:
        equals_string: vertices
        required: true

  LinksMeta:
    description: "``.zattrs`` for the ``links/`` array."
    slots: [zv_array, dtype, link_width]
    slot_usage:
      zv_array:
        equals_string: links
        required: true

  AttributeMeta:
    description: "``.zattrs`` for each ``attributes/<name>/`` array."
    slots: [zv_array, name, dtype, channel_names]
    slot_usage:
      zv_array:
        equals_string: attribute
        required: true

  ObjectIndexMeta:
    description: "``.zattrs`` for ``object_index/``."
    slots: [zv_array, num_objects, sid_ndim]
    slot_usage:
      zv_array:
        equals_string: object_index
        required: true

  ObjectIndexPendingMeta:
    description: "``.zattrs`` for ``object_index/pending/<batch_id>/``."
    slots: [zv_array, batch_id, num_objects, sid_ndim]
    slot_usage:
      zv_array:
        equals_string: object_index_pending
        required: true

  ObjectAttributeMeta:
    description: "``.zattrs`` for each ``object_attributes/<name>/`` array."
    slots: [zv_array, name, dtype, shape]
    slot_usage:
      zv_array:
        equals_string: object_attribute
        required: true

  GroupingsMeta:
    description: "``.zattrs`` for ``groupings/``."
    slots: [zv_array, num_groups]
    slot_usage:
      zv_array:
        equals_string: groupings
        required: true

  GroupingsAttributeMeta:
    description: "``.zattrs`` for each ``groupings_attributes/<name>/`` array."
    slots: [zv_array, name, dtype, shape]
    slot_usage:
      zv_array:
        equals_string: groupings_attribute
        required: true

  CrossChunkLinksMeta:
    description: "``.zattrs`` for ``cross_chunk_links/``."
    slots: [zv_array, num_links, sid_ndim]
    slot_usage:
      zv_array:
        equals_string: cross_chunk_links
        required: true

  CrossChunkFacesMeta:
    description: "``.zattrs`` for ``cross_chunk_faces/`` (0.3 capability ``cross_chunk_faces``)."
    slots: [zv_array, num_faces, sid_ndim, record_size]
    slot_usage:
      zv_array:
        equals_string: cross_chunk_faces
        required: true

  LinkAttributeMeta:
    description: "``.zattrs`` for each ``link_attributes/<name>/`` array."
    slots: [zv_array, name, dtype]
    slot_usage:
      zv_array:
        equals_string: link_attribute
        required: true

  MetanodeChildrenMeta:
    description: "``.zattrs`` for the ``metanode_children/`` coarsening sidecar."
    slots: [zv_array, num_metanodes, sid_ndim]
    slot_usage:
      zv_array:
        equals_string: metanode_children
        required: true

# ===================================================================
# Slots
# ===================================================================

slots:

  # -- Axis ---------------------------------------------------------------

  name:
    description: NGFF axis or attribute name (e.g. "x", "intensity").
    range: string
    required: true
    slot_uri: schema:name
  type:
    description: NGFF axis type — "space", "time", or "channel".
    range: string
    required: true
  unit:
    description: NGFF unit string (e.g. "um", "nanometer", "second").
    range: string

  # -- BoundingBox --------------------------------------------------------

  min_corner:
    description: Per-axis minima.  Length must equal ``len(spatial_index_dims)``.
    range: float
    multivalued: true
    required: true
  max_corner:
    description: Per-axis maxima.  Length must equal ``len(spatial_index_dims)``.
    range: float
    multivalued: true
    required: true

  # -- RootMetadata ------------------------------------------------------

  format_version:
    description: Spec version this store was written against (e.g. "0.3").
    range: string
    required: true
    slot_uri: schema:version
    pattern: '^\d+\.\d+(\.\d+)?$'
  spatial_index_dims:
    description: NGFF-style axis list — at least 2, with ≥2 of type "space".
    range: Axis
    multivalued: true
    required: true
    minimum_cardinality: 2
  chunk_shape:
    description: Physical spatial chunk size per axis (all values > 0).
    range: float
    multivalued: true
    required: true
  bounds:
    description: Global vertex bounding box.
    range: BoundingBox
    required: true
  geometry_types:
    description: One or more geometry kinds present in the store.
    range: GeometryType
    multivalued: true
    required: true
    minimum_cardinality: 1
  crs:
    description: >
      Optional coordinate reference system metadata (free-form dict
      matching whatever CRS vocabulary the store uses).
    range: string
    slot_uri: schema:coordinateReferenceSystem
  links_convention:
    range: LinksConvention
  object_index_convention:
    range: ObjectIndexConvention
  cross_chunk_strategy:
    range: CrossChunkStrategy
  reduction_factor:
    description: Multi-resolution coarsening factor (≥ 2).
    range: integer
    minimum_value: 2
  base_bin_shape:
    description: >
      Supervoxel bin edge lengths at level 0.  When set, every value
      must be > 0 and ``chunk_shape`` must be an integer multiple along
      every axis (enforced runtime-side in ``RootMetadata.validate``).
    range: float
    multivalued: true
  format_capabilities:
    description: Optional 0.3+ feature tokens advertised by this store.
    range: FormatCapability
    multivalued: true

  # -- LevelMetadata -----------------------------------------------------

  level:
    description: Resolution level index (0 = full resolution).
    range: integer
    minimum_value: 0
    required: true
  vertex_count:
    description: Total number of vertices at this level.
    range: integer
    minimum_value: 0
    required: true
  arrays_present:
    description: Names of arrays present in the level group.
    range: string
    multivalued: true
    required: true
  bin_shape:
    description: >
      Per-axis supervoxel edge lengths at this level.  Must be ``None``
      for level 0 (inherits ``base_bin_shape``); must be set for
      level > 0.
    range: float
    multivalued: true
  bin_ratio:
    description: Integer fold-change per axis relative to level 0.
    range: integer
    multivalued: true
  object_sparsity:
    description: Fraction of objects retained at this level.
    range: float
    minimum_value: 0.0
    maximum_value: 1.0
  coarsening_method:
    description: How this level was generated (e.g. "grid_metanode").
    range: string
  parent_level:
    description: Source level index (None for level 0).
    range: integer
    minimum_value: 0
  chunk_dims:
    description: >
      Chunk-key axis names; the leading axis names appear first.  Set
      when the level uses attribute chunking (e.g. ``["gene", "z", "y",
      "x"]``).
    range: string
    multivalued: true
  chunk_attribute_name:
    description: Name of the per-vertex attribute used as the leading chunk axis.
    range: string
  chunk_attribute_values:
    description: >
      Ordered list mapping attribute-bin index to original attribute
      value.  Must be non-empty when set, and coherent with
      ``chunk_attribute_name`` (both set or both absent).
    range: string
    multivalued: true

  # -- per-array .zattrs ------------------------------------------------

  zv_array:
    description: >
      Discriminator slot identifying the kind of per-array ``.zattrs``
      block.  Each writer in ``core/arrays.py`` stamps the
      corresponding token from :class:`ZvArrayTag`.
    range: ZvArrayTag
    required: true
  dtype:
    description: Numpy dtype string of the array's value type (e.g. "float32").
    range: string
    required: true
  encoding:
    description: How the chunk bytes are encoded.
    range: Encoding
  channel_names:
    description: For multi-channel per-vertex attributes, the channel labels.
    range: string
    multivalued: true
  link_width:
    description: Width of a links row (2 for edges, 3 or 4 for face rows).
    range: integer
    minimum_value: 2
    required: true
  num_objects:
    description: Total object count this array carries.
    range: integer
    minimum_value: 0
    required: true
  num_groups:
    description: Total grouping count.
    range: integer
    minimum_value: 0
    required: true
  num_links:
    description: Total cross-chunk link count.
    range: integer
    minimum_value: 0
    required: true
  num_faces:
    description: Total cross-chunk face count.
    range: integer
    minimum_value: 0
    required: true
  num_metanodes:
    description: Total metanode count in a coarsening sidecar.
    range: integer
    minimum_value: 0
    required: true
  sid_ndim:
    description: Number of spatial-index dimensions encoded in chunk keys.
    range: integer
    minimum_value: 1
    required: true
  record_size:
    description: >
      Per-face record width in ``cross_chunk_faces/data`` (sid_ndim + 2
      int64s).
    range: integer
    minimum_value: 2
    required: true
  shape:
    description: Shape of a dense per-object/per-group array.
    range: integer
    multivalued: true
    required: true
  batch_id:
    description: Monotonic batch id for an ``object_index/pending/<batch>`` sidecar.
    range: integer
    minimum_value: 0
    required: true
